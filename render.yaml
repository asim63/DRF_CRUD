services:
  - type: web
    name: drf-crud-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: bash build.sh
    preDeployCommand: python manage.py migrate --no-input
    startCommand: gunicorn drf_crud.wsgi:application
    healthCheckPath: /api/health/
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.8
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "false"
      - key: ALLOWED_HOSTS
        value: .onrender.com
      - key: FRONTEND_URL
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: CSRF_TRUSTED_ORIGINS
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: drf-crud-db
          property: connectionString

  - type: web
    name: grocery-bud-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE_URL
        sync: false

databases:
  - name: drf-crud-db
    plan: free
